    body {
        font-family: Arial, sans-serif;

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.9/MathJax.js?config=TeX-MML-AM_CHTML"></script>

<body>

<nav>
    <ul>
        <li><a href="index.html">Statistics Formulas</a></li>

    </ul>
</nav>

<div class="content">

<header>
    <h1>Interactive Normal Distribution</h1>
</header>

<h3>Find Probability Using z-score</h3>

<!-- NEW SECTION (before curve) -->
<div class="controls">
    <label><input type="radio" name="probType" value="left" checked> Left of z</label>
    <label><input type="radio" name="probType" value="right"> Right of z</label>
    <label><input type="radio" name="probType" value="between"> Between z1 & z2</label>
</div>

<div class="controls">
    <label>z1: <input type="number" id="z1Input" value="1" step="0.01"></label>
    <label id="z2Label" style="display:none;">
        z2: <input type="number" id="z2Input" value="2" step="0.01">
    </label>
</div>

<div class="area-display" id="areaDisplay">P(X ≤ z) = 0.8413</div>

<canvas id="normalCanvas" width="600" height="300"></canvas>

<hr>

<h3>Z-Score Calculator</h3>

<div class="controls">
    <label>x: <input type="number" id="xInput" value="0"></label>
    <label>μ: <input type="number" id="meanInput" value="0"></label>
    <label>σ: <input type="number" id="sdInput" value="1"></label>
</div>

<div class="area-display" id="zResult">z = 0.0000</div>

<script>
const canvas = document.getElementById("normalCanvas");
const ctx = canvas.getContext("2d");
const width = canvas.width;
const height = canvas.height;

function normalPDF(x) {
    return (1/Math.sqrt(2*Math.PI)) * Math.exp(-0.5*x*x);
}

function normalCDF(z) {
    return 0.5 * (1 + erf(z/Math.sqrt(2)));
}

function erf(x) {
    const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
    const sign = x>=0 ? 1 : -1;
    x = Math.abs(x);
    const t = 1/(1+p*x);
    const y = 1 - (((((a5*t+a4)*t+a3)*t+a2)*t+a1)*t*Math.exp(-x*x));
    return sign*y;
}

function xToPixel(x) { return (x + 4)/8 * width; }
function yToPixel(y) { return height - y*height*1.5; }

function drawNormal(type, z1, z2) {
    ctx.clearRect(0,0,width,height);
    const step = 0.01;

    let startX, endX;
    if(type==='left'){ startX=-4; endX=z1; }
    if(type==='right'){ startX=z1; endX=4; }
    if(type==='between'){ startX=z1; endX=z2; }

    // shading
    ctx.beginPath();
    ctx.moveTo(xToPixel(startX), height);
    for(let x=startX; x<=endX; x+=step){
        ctx.lineTo(xToPixel(x), yToPixel(normalPDF(x)));
    }
    ctx.lineTo(xToPixel(endX), height);
    ctx.closePath();
    ctx.fillStyle="rgba(106,13,173,0.3)";
    ctx.fill();

    // curve
    ctx.beginPath();
    for(let x=-4; x<=4; x+=step){
        const y = normalPDF(x);
        if(x===-4) ctx.moveTo(xToPixel(x), yToPixel(y));
        else ctx.lineTo(xToPixel(x), yToPixel(y));
    }
    ctx.strokeStyle="#6a0dad";
    ctx.lineWidth=3;
    ctx.stroke();

    // probability
    let area;
    if(type==='left') area = normalCDF(z1);
    if(type==='right') area = 1 - normalCDF(z1);
    if(type==='between') area = normalCDF(z2) - normalCDF(z1);

    document.getElementById("areaDisplay").innerText =
        "P = " + area.toFixed(4);
}

// update graph
function update() {
    const type = document.querySelector('input[name="probType"]:checked').value;
    document.getElementById("z2Label").style.display = (type==='between') ? "inline" : "none";

    const z1 = parseFloat(document.getElementById("z1Input").value);
    const z2 = parseFloat(document.getElementById("z2Input").value);

    drawNormal(type, z1, z2);
}

document.querySelectorAll('input[name="probType"]').forEach(r=>r.addEventListener("change", update));
document.getElementById("z1Input").addEventListener("input", update);
document.getElementById("z2Input").addEventListener("input", update);

update();

// Z-score calculator
function updateZ() {
    const x = parseFloat(document.getElementById("xInput").value);
    const mean = parseFloat(document.getElementById("meanInput").value);
    const sd = parseFloat(document.getElementById("sdInput").value);

    if(sd===0){
        document.getElementById("zResult").innerText="σ cannot be 0";
        return;
    }

    const z = (x-mean)/sd;
    document.getElementById("zResult").innerText = "z = " + z.toFixed(4);
}

document.getElementById("xInput").addEventListener("input", updateZ);
document.getElementById("meanInput").addEventListener("input", updateZ);
document.getElementById("sdInput").addEventListener("input", updateZ);

updateZ();
</script>

</div>
</body>
