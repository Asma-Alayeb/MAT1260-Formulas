<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAT1260 Normal Distribution</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 20px;
        color: #333;
        line-height: 1.8;
    }
    nav ul { list-style: none; padding: 0; margin: 0 0 20px 0; display: flex; gap: 15px; }
    nav a { text-decoration: none; color: #6a0dad; font-weight: bold; }
    header {
        background-color: #6a0dad;
        color: #fff;
        padding: 15px 0;
        text-align: center;
        border-bottom: 5px solid #b8860b;
        margin-bottom: 25px;
    }
    .content { max-width: 900px; margin: 0 auto; }
    canvas { border: 1px solid #ccc; margin-top: 20px; margin-bottom: 10px; }
    input[type="number"] { width: 60px; font-size: 16px; margin-left: 10px; }
    .area-display { font-weight: bold; font-size: 16px; margin-bottom: 10px; color: #6a0dad; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.9/MathJax.js?config=TeX-MML-AM_CHTML"></script>
</head>
<body>
<nav>
    <ul>
        <li><a href="index.html">Statistics Formulas and Excel Codes</a></li>
        <li><a href="page1.html">Normal Distribution</a></li>
    </ul>
</nav>
<header>
    <h1>Normal Distribution Interactive Curve</h1>
</header>

<div class="content">
<h3>Interactive Normal Curve</h3>
<label>z-score: <input type="number" id="zInput" value="1" step="0.01" min="-4" max="4"></label>
<div class="area-display" id="areaDisplay">P(X ≤ z) = 0.8413</div>
<canvas id="normalCanvas" width="600" height="300"></canvas>

<script>
// Canvas setup
const canvas = document.getElementById("normalCanvas");
const ctx = canvas.getContext("2d");
const width = canvas.width;
const height = canvas.height;

// Standard normal PDF
function normalPDF(x, mu=0, sigma=1) {
    return (1/(sigma*Math.sqrt(2*Math.PI))) * Math.exp(-0.5*Math.pow((x-mu)/sigma,2));
}

// Standard normal CDF using approximate erf
function normalCDF(z) {
    return 0.5 * (1 + erf(z/Math.sqrt(2)));
}

// Error function approximation
function erf(x) {
    const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
    const sign = x>=0 ? 1 : -1;
    x = Math.abs(x);
    const t = 1/(1+p*x);
    const y = 1 - (((((a5*t+a4)*t+a3)*t+a2)*t+a1)*t*Math.exp(-x*x));
    return sign*y;
}

// Pixel conversion
function xToPixel(x, minX=-4, maxX=4) { return (x - minX)/(maxX - minX) * width; }
function yToPixel(y, scale=1.5) { return height - y*height*scale; }

// Draw normal curve and shaded area
function drawNormal(zscore) {
    ctx.clearRect(0, 0, width, height);

    // Axes
    ctx.beginPath();
    ctx.moveTo(0, height); ctx.lineTo(width, height); // x-axis
    ctx.moveTo(50, 0); ctx.lineTo(50, height); // y-axis
    ctx.strokeStyle = "#333"; ctx.lineWidth = 2; ctx.stroke();

    // Shaded area to left of z
    ctx.beginPath();
    const step = 0.01;
    ctx.moveTo(xToPixel(-4), height);
    for (let x=-4; x<=Math.min(zscore,4); x+=step) {
        const y = normalPDF(x);
        ctx.lineTo(xToPixel(x), yToPixel(y));
    }
    ctx.lineTo(xToPixel(Math.min(zscore,4)), height);
    ctx.closePath();
    ctx.fillStyle = "rgba(106,13,173,0.3)";
    ctx.fill();

    // Normal curve
    ctx.beginPath();
    for (let x=-4; x<=4; x+=step) {
        const y = normalPDF(x);
        const px = xToPixel(x);
        const py = yToPixel(y);
        if (x===-4) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
    }
    ctx.strokeStyle = "#6a0dad"; ctx.lineWidth = 3; ctx.stroke();

    // z-score line and label
    if (zscore >= -4 && zscore <= 4) {
        ctx.beginPath();
        ctx.moveTo(xToPixel(zscore), height);
        ctx.lineTo(xToPixel(zscore), yToPixel(normalPDF(zscore)));
        ctx.strokeStyle = "blue"; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = "blue"; ctx.font = "16px Arial"; ctx.textAlign = "center";
        ctx.fillText("z = " + zscore, xToPixel(zscore), yToPixel(normalPDF(zscore)) - 10);
    }

    // Update area display
    const area = normalCDF(zscore);
    document.getElementById("areaDisplay").innerText = "P(X ≤ z) = " + area.toFixed(4);
}

// Initial draw
const zInput = document.getElementById("zInput");
drawNormal(parseFloat(zInput.value));
zInput.addEventListener("input", () => drawNormal(parseFloat(zInput.value)));
</script>

</div>
</body>
